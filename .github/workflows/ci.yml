name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Unit tests (SpellingSyncCore)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: swift test
        run: swift test

  sql-tests:
    name: SQL/RLS tests (migrations + RPC)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: spelling_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - name: Run SQL tests
        env:
          TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/spelling_test
        run: bash scripts/db/test.sh

  e2e:
    name: E2E (XCUITest)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Pick an available iPad simulator
        id: sim
        run: |
          UDID=$(xcrun simctl list devices available --json \
            | python3 -c "import sys, json; d = json.load(sys.stdin)['devices']; c = [x for r, ds in d.items() if 'iOS' in r for x in ds if x.get('isAvailable') and 'iPad' in x['name']]; print(c[0]['udid'] if c else '')")
          if [ -z "$UDID" ]; then
            echo "No iPad simulator available:"; xcrun simctl list devices available; exit 1
          fi
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"
          echo "Using simulator id=$UDID"

      - name: Boot simulator and wait until ready
        run: |
          # コールド起動の初回 app.launch() タイムアウトを避けるため、事前に起動して完了を待つ。
          xcrun simctl boot "${{ steps.sim.outputs.udid }}" || true
          xcrun simctl bootstatus "${{ steps.sim.outputs.udid }}" -b

      - name: Run E2E (builds app + UI tests)
        run: |
          set -o pipefail
          xcodebuild test \
            -project SpellingTrainer.xcodeproj \
            -scheme SpellingTrainer \
            -destination "id=${{ steps.sim.outputs.udid }}" \
            -only-testing:SpellingTrainerUITests \
            -resultBundlePath TestResults.xcresult \
            -retry-tests-on-failure -test-iterations 2 \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results
          path: TestResults.xcresult
          if-no-files-found: ignore
