name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Unit tests (SpellingSyncCore)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: swift test
        run: swift test

  e2e:
    name: E2E (XCUITest)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Pick an available iPad simulator
        id: sim
        run: |
          UDID=$(xcrun simctl list devices available --json \
            | python3 -c "import sys, json; d = json.load(sys.stdin)['devices']; c = [x for r, ds in d.items() if 'iOS' in r for x in ds if x.get('isAvailable') and 'iPad' in x['name']]; print(c[0]['udid'] if c else '')")
          if [ -z "$UDID" ]; then
            echo "No iPad simulator available:"; xcrun simctl list devices available; exit 1
          fi
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"
          echo "Using simulator id=$UDID"

      - name: Boot simulator and wait until ready
        run: |
          # コールド起動の初回 app.launch() タイムアウトを避けるため、事前に起動して完了を待つ。
          xcrun simctl boot "${{ steps.sim.outputs.udid }}" || true
          xcrun simctl bootstatus "${{ steps.sim.outputs.udid }}" -b

      - name: Run E2E (builds app + UI tests)
        run: |
          set -o pipefail
          xcodebuild test \
            -project SpellingTrainer.xcodeproj \
            -scheme SpellingTrainer \
            -destination "id=${{ steps.sim.outputs.udid }}" \
            -only-testing:SpellingTrainerUITests \
            -resultBundlePath TestResults.xcresult \
            -retry-tests-on-failure -test-iterations 2 \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results
          path: TestResults.xcresult
          if-no-files-found: ignore
